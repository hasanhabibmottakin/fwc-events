name: System Metric Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev nlohmann-json3-dev

      - name: Build Source
        run: g++ -O3 main.cpp -lcurl -o processor

      - name: Execute Routine
        env:
          BUILD_CONFIG_X1: ${{ secrets.BUILD_CONFIG_X1 }}
          BUILD_CONFIG_X2: ${{ secrets.BUILD_CONFIG_X2 }}
          METRIC_THRESHOLD: ${{ secrets.METRIC_THRESHOLD }}
          CACHE_SALT: ${{ secrets.CACHE_SALT }}
        run: ./processor

      - name: Sync Artifacts
        run: |
          git config --global user.name "Actions Bot"
          git config --global user.email "actions@github.com"
          git add fwc_events.m3u fwc_events_highlight.m3u events.json
          git commit -m "Update system state" || echo "No changes"
          git push
